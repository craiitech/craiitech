name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_PUBLIC_FIREBASE_API_KEY: test-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: test-app-id
      NEXT_PUBLIC_ATTENDANCE_SALT_2025: test-salt-2025
      NEXT_PUBLIC_ATTENDANCE_SALT_2026: test-salt-2026
      NEXT_PUBLIC_OTP_SALT_2025: test-otp-salt-2025
      NEXT_PUBLIC_OTP_SALT_2026: test-otp-salt-2026
      NEXT_PUBLIC_OFFLINE_SALT_2025: test-offline-salt-2025
      NEXT_PUBLIC_OFFLINE_SALT_2026: test-offline-salt-2026

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint
        continue-on-error: false

      - run: npm run typecheck
        continue-on-error: false

      - run: npm run test
        continue-on-error: false

      - run: npm run build
        continue-on-error: false
